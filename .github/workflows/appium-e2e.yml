name: Appium E2E Tests

on:
  workflow_run:
    workflows: ["Android Build Pipeline"]
    types:
      - completed

jobs:
  e2e-tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: e2e_tests
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Download APK
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./app-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ ADD THIS: Download unit test results
      - name: Download Unit Test Results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: ./unit-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Upload APK to BrowserStack
      - name: Upload APK to BrowserStack
        id: upload
        working-directory: e2e_tests
        run: |
          RESPONSE=$(curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
          -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
          -F "file=@../app-artifact/app-debug.apk")
          APP_URL=$(echo $RESPONSE | jq -r '.app_url')
          if [ -z "$APP_URL" ] || [ "$APP_URL" = "null" ]; then
            exit 1
          fi
          echo "APP_URL=$APP_URL" >> $GITHUB_ENV
      - name: Run Appium Tests
        working-directory: e2e_tests
        run: npx wdio run wdio.browserstack.conf.ts
        env:
          BROWSERSTACK_APP_ID_Android: ${{ env.APP_URL }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      # ✅ ADD THIS: Extract E2E Results
      # ✅ Extract E2E Results
      - name: Extract E2E Results
        working-directory: e2e_tests
        run: |
          # Target the specific file generated by the reporter
          REPORT="./reports/test-results.json"

          if [ -f "$REPORT" ]; then
            # Extract metrics using the wdio-json-reporter structure
            TOTAL=$(jq '.metrics.passed + .metrics.failed + .metrics.skipped' $REPORT)
            PASSED=$(jq '.metrics.passed' $REPORT)
            FAILED=$(jq '.metrics.failed' $REPORT)
          else
            echo "Report not found, setting values to 0"
            TOTAL=0
            PASSED=0
            FAILED=0
          fi

          echo "E2E_TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "E2E_PASSED=$PASSED" >> $GITHUB_ENV
          echo "E2E_FAILED=$FAILED" >> $GITHUB_ENV

      # ✅ IMPORTANT: Upload summary for email workflow
      - name: Save Summary
        run: |
          echo "UNIT_TOTAL=${{ env.UNIT_TOTAL }}" >> summary.txt
          echo "UNIT_PASSED=${{ env.UNIT_PASSED }}" >> summary.txt
          echo "UNIT_FAILED=${{ env.UNIT_FAILED }}" >> summary.txt
          echo "E2E_TOTAL=${{ env.E2E_TOTAL }}" >> summary.txt
          echo "E2E_PASSED=${{ env.E2E_PASSED }}" >> summary.txt
          echo "E2E_FAILED=${{ env.E2E_FAILED }}" >> summary.txt
      - name: Upload Summary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: summary.txt