name: Appium E2E Tests

on:
  workflow_run:
    workflows: ["Android Build Pipeline"]
    types:
      - completed

jobs:
  e2e-tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: e2e_tests
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Download APK
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./app-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Download Unit Test Results
      - name: Download Unit Test Results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: ./unit-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ NEW STEP: Extract Unit Test Results
      - name: Extract Unit Test Results
        run: |
          # Find all JUnit XML report files
          REPORTS=$(find ./unit-results -name "*.xml")
          
          if [ -z "$REPORTS" ]; then
            echo "UNIT_TOTAL=0" >> $GITHUB_ENV
            echo "UNIT_PASSED=0" >> $GITHUB_ENV
            echo "UNIT_FAILED=0" >> $GITHUB_ENV
            exit 0
          fi

          # Sum up results from multiple files if they exist
          TOTAL=0
          FAILURES=0
          
          for REPORT in $REPORTS; do
            T=$(grep -o 'tests="[0-9]*"' "$REPORT" | head -1 | grep -o '[0-9]*')
            F=$(grep -o 'failures="[0-9]*"' "$REPORT" | head -1 | grep -o '[0-9]*')
            TOTAL=$((TOTAL + T))
            FAILURES=$((FAILURES + F))
          done
          
          PASSED=$((TOTAL - FAILURES))

          echo "UNIT_TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "UNIT_PASSED=$PASSED" >> $GITHUB_ENV
          echo "UNIT_FAILED=$FAILURES" >> $GITHUB_ENV

      # ✅ Upload APK to BrowserStack
      - name: Upload APK to BrowserStack
        id: upload
        working-directory: e2e_tests
        run: |
          RESPONSE=$(curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
          -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
          -F "file=@../app-artifact/app-debug.apk")
          APP_URL=$(echo $RESPONSE | jq -r '.app_url')
          if [ -z "$APP_URL" ] || [ "$APP_URL" = "null" ]; then
            exit 1
          fi
          echo "APP_URL=$APP_URL" >> $GITHUB_ENV
          

      - name: Run Appium Tests
        working-directory: e2e_tests
        run: npx wdio run wdio.browserstack.conf.ts
        env:
          BROWSERSTACK_APP_ID_Android: ${{ env.APP_URL }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      # ✅ ADD THIS: Extract E2E Results
      # ✅ Extract E2E Results
      # ✅ Extract E2E Results using the correct JSON paths
      - name: Extract E2E Results
        working-directory: e2e_tests
        run: |
          REPORT="./reports/test-results.json"

          if [ -f "$REPORT" ]; then
            # Extract from the .state object found in your JSON
            PASSED=$(jq '.state.passed // 0' $REPORT)
            FAILED=$(jq '.state.failed // 0' $REPORT)
            SKIPPED=$(jq '.state.skipped // 0' $REPORT)
            TOTAL=$((PASSED + FAILED + SKIPPED))
          else
            echo "Report not found, defaulting to 0"
            TOTAL=0
            PASSED=0
            FAILED=0
          fi

          echo "E2E_TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "E2E_PASSED=$PASSED" >> $GITHUB_ENV
          echo "E2E_FAILED=$FAILED" >> $GITHUB_ENV

      # ✅ IMPORTANT: Upload summary for email workflow
      - name: Save Summary
        run: |
          echo "UNIT_TOTAL=${{ env.UNIT_TOTAL }}" >> summary.txt
          echo "UNIT_PASSED=${{ env.UNIT_PASSED }}" >> summary.txt
          echo "UNIT_FAILED=${{ env.UNIT_FAILED }}" >> summary.txt
          echo "E2E_TOTAL=${{ env.E2E_TOTAL }}" >> summary.txt
          echo "E2E_PASSED=${{ env.E2E_PASSED }}" >> summary.txt
          echo "E2E_FAILED=${{ env.E2E_FAILED }}" >> summary.txt

      - name: Upload Summary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: summary.txt