name: Appium E2E Tests

on:
  workflow_run:
    workflows: ["Android Build Pipeline"]
    types:
      - completed

jobs:
  e2e-tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: e2e_tests
        run: npm install

      # ✅ Install jq (required for parsing API response)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./app-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Upload APK to BrowserStack
      - name: Upload APK to BrowserStack
        id: upload
        working-directory: e2e_tests
        run: |
          RESPONSE=$(curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
          -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
          -F "file=@../app-artifact/app-debug.apk")

          echo "Upload Response: $RESPONSE"

          APP_URL=$(echo $RESPONSE | jq -r '.app_url')

          if [ -z "$APP_URL" ] || [ "$APP_URL" = "null" ]; then
            echo "❌ App upload failed. Exiting..."
            exit 1
          fi

          echo "✅ App uploaded successfully: $APP_URL"
          echo "APP_URL=$APP_URL" >> $GITHUB_ENV

      # ✅ Debug (optional but useful)
      - name: Debug App URL
        run: echo "App URL is $APP_URL"

      # ✅ Run Appium Tests with correct env mapping
      - name: Run Appium Tests
        working-directory: e2e_tests
        run: npx wdio run wdio.browserstack.conf.ts
        env:
          BROWSERSTACK_APP_ID_Android: ${{ env.APP_URL }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}